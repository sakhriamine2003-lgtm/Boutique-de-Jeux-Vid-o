<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-[#101010] ">
     
<header class="bg-[#3C3B3B] flex items-center justify-between px-6 py-3  shadow-lg ">

    <div class="flex items-center gap-3">
        <img 
            class="w-10 h-10 object-contain" 
            src="https://cdn-icons-png.flaticon.com/128/8354/8354609.png" 
            alt="Instant Gaming Logo"
        >
        <p class="text-white ">
            INSTANT GAMING
        </p>
    </div>


    <div class="flex items-center gap-6">
        
      <input id="search" class="rounded-[10px] w-[150px] px-4 " type="text" placeholder="search"> 
      <img  
            class="w-8 h-8 " 
            src="https://cdn-icons-png.flaticon.com/128/3643/3643914.png"  alt="logo"
        >
    </div>

</header>

<main>
    <div>
        <img class="h-[250px] w-[60%] " src="https://tse1.mm.bing.net/th/id/OIP.w68_7AdafYNh4-f9w3j_2gAAAA?pid=ImgDet&w=178&h=100&c=7&dpr=1.5&o=7&rm=3" alt="logo">
    </div>

    <section class="bg-[#3C3B3B] text-white h-[200px]">
        <h2 class="font-bold text-[#FF913D] flex justify-center p-2">Life is Strange: Reunion - PC (Steam)</h2>
        <div class=" flex justify-center">
            <img class="w-6" src="https://cdn-icons-png.flaticon.com/128/14261/14261136.png" alt="logo">
            <p>103 utilisateurs sur cette page</p>

        </div>
        <div class="flex  justify-center gap-8">
            <p>40 €  </p>
            <p>-21% </p>
            <p>31.69 €</p>
        </div>

        <div class="flex justify-center gap-6 m-4">
            <button class=" w-[50px] h-12 bg-[#FF913D] rounded-[10px] ">  🖤 </button>
            <button class=" bg-[#FF913D]  w-[150px] h-12 text-white rounded-[10px] ">Ajouter au panier</button>

        </div>

    </section>
       <div class="text-white text-2xl m-4"> <h2>Tendances  ></h2></div>

<div class="flex flex-wrap gap-4 mx-4"  id="cards" ></div>
<div id="app"></div>

</main>

<script type="module" src="main.js"></script>
</body>
</html>
